      <h2>Step 1: What kind of cuisine are you in the mood for?</h2>
      <div class="options-grid">
        
          <label class="wizard-option ">
            <input type="radio" name="cuisine" value="Seafood" onchange="window.handleWizardChange('cuisine', 'Seafood')">
            Seafood
          </label>
        
          <label class="wizard-option ">
            <input type="radio" name="cuisine" value="Italian" onchange="window.handleWizardChange('cuisine', 'Italian')">
            Italian
          </label>
        
          <label class="wizard-option ">
            <input type="radio" name="cuisine" value="American" onchange="window.handleWizardChange('cuisine', 'American')">
            American
          </label>
        
          <label class="wizard-option ">
            <input type="radio" name="cuisine" value="Pub Food" onchange="window.handleWizardChange('cuisine', 'Pub Food')">
            Pub Food
          </label>
        
          <label class="wizard-option ">
            <input type="radio" name="cuisine" value="Asian" onchange="window.handleWizardChange('cuisine', 'Asian')">
            Asian
          </label>
        
          <label class="wizard-option ">
            <input type="radio" name="cuisine" value="Mexican" onchange="window.handleWizardChange('cuisine', 'Mexican')">
            Mexican
          </label>
        
          <label class="wizard-option ">
            <input type="radio" name="cuisine" value="Bakery/Cafe" onchange="window.handleWizardChange('cuisine', 'Bakery/Cafe')">
            Bakery/Cafe
          </label>
        
          <label class="wizard-option ">
            <input type="radio" name="cuisine" value="Other" onchange="window.handleWizardChange('cuisine', 'Other')">
            Other
          </label>
        
          <label class="wizard-option ">
            <input type="radio" name="cuisine" value="Any" onchange="window.handleWizardChange('cuisine', 'Any')">
            Any
          </label>
        
      </div>
      <div class="wizard-actions">
        <button class="wizard-btn next-btn" onclick="window.nextWizardStep()" disabled="disabled">Next</button>
      </div>

        <!-- Advanced Options -->
        <details class="search-options" id="advanced-options" style="display: block;">
          <summary>Advanced Options</summary>
          <div class="options-content">
            <label>
              <span>Max Results: <span id="match-count-display">5</span></span>
              <input type="number" id="match-count" min="1" max="50" value="5">
            </label>
          </div>
        </details>

        <div id="content-area"></div>

     <script>
  LottieInteractivity.create({
    player: '#logo',
    mode: 'chain',
    actions: [

          state: 'loop',
          transition: 'onComplete',

      {
          state: 'loop',
          transition: 'onComplete',
          frames: [11,248]
